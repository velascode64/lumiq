[pytest]
# Configuración de pytest para el módulo core

# Directorio de tests
testpaths = tests

# Patrones de archivos de test
python_files = test_*.py

# Clases de test
python_classes = Test*

# Funciones de test
python_functions = test_*

# Opciones adicionales
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings

# Marcadores personalizados
markers =
    unit: Marca tests unitarios
    integration: Marca tests de integración
    slow: Marca tests lentos
    live: Marca tests que requieren conexión live
    
# Coverage
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*