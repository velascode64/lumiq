version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/core.Dockerfile
    environment:
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_API_SECRET: ${ALPACA_API_SECRET}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_IS_PAPER: ${ALPACA_IS_PAPER:-true}
      ALPACA_BASE_URL: ${ALPACA_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AGNO_PROVIDER: ${AGNO_PROVIDER:-openai}
      AGNO_MODEL: ${AGNO_MODEL:-gpt-4o-mini}
      LUMIQ_DATABASE_URL: ${LUMIQ_DATABASE_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "${LUMIQ_CORE_API_PORT:-8000}:8000"
    volumes:
      - ./platform/alerts/data:/app/platform/alerts/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    command: ["python", "-m", "uvicorn", "lumiq.app.main:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000"]

  telegram-bot:
    build:
      context: .
      dockerfile: docker/telegram-bot.Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      LUMIQ_CORE_API_URL: ${LUMIQ_CORE_API_URL:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    command: ["python", "-m", "lumiq.telegram_bot.run_bot"]
