[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    live: Tests that require live external services
